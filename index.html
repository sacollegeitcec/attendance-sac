<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infotech Internship Attendance</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f4f9;
      font-family: sans-serif;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Simple UI interactive helper to satisfy modern browser fullscreen policies */
    #fullscreen-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #007bff;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 9999;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    #fullscreen-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Replace this URL with your unique published Google Web App URL -->
  <iframe 
    src="https://script.google.com/macros/s/AKfycbwebxA3kHOcMWMZZCfH_qmEt-4NoQBTVIhMBXyPC36PJXXNHPWTwc-Wz3wHor6AiYs/exec"
    allowfullscreen="true">
  </iframe>

  <button id="fullscreen-btn">Go Fullscreen</button>

  <script>
    const btn = document.getElementById('fullscreen-btn');
    
    btn.addEventListener('click', () => {
      document.querySelector('iframe')
        .requestFullscreen()
        .then(() => {
          btn.style.display = 'none'; 
        })
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    });
  </script>
</body>
</html>
